<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Page Not Found | GrowEarn</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Hind Siliguri', 'Inter', sans-serif; background-color: #F8FAFC; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .glitch-text { font-size: 120px; font-weight: 900; line-height: 1; color: #E2E8F0; text-shadow: 4px 4px 0 #E11D48, -4px -4px 0 #3B82F6; animation: glitch 2s infinite; position: absolute; opacity: 0.2; z-index: 0; }
        @keyframes glitch { 
            0% { transform: translate(0) } 
            20% { transform: translate(-5px, 5px) } 
            40% { transform: translate(-5px, -5px) } 
            60% { transform: translate(5px, 5px) } 
            80% { transform: translate(5px, -5px) } 
            100% { transform: translate(0) } 
        }
        .error-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 32px; border: 1px solid #E2E8F0; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); position: relative; z-index: 10; padding: 40px; text-align: center; max-width: 400px; width: 90%; }
        .fade-in { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="glitch-text">404</div>

    <div class="error-card fade-in">
        <div class="h-20 w-20 bg-red-50 text-red-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-sm border border-red-100">
            <i class="fa-solid fa-map-location-dot"></i>
        </div>
        
        <h1 class="text-2xl font-black text-slate-800 tracking-tight mb-2">পেজটি পাওয়া যায়নি!</h1>
        <p class="text-sm text-slate-500 font-medium leading-relaxed mb-8">
            আপনি যে লিংকটি খুঁজছেন সেটি হয়তো পরিবর্তন করা হয়েছে বা মুছে ফেলা হয়েছে। দয়া করে সঠিক লিংক চেক করুন।
        </p>
        
        <div class="flex flex-col gap-3">
            <a href="/" class="bg-red-600 text-white py-4 rounded-xl text-sm font-black uppercase tracking-widest shadow-[0_8px_20px_rgba(225,29,72,0.25)] hover:bg-red-700 active:scale-95 transition-all flex items-center justify-center gap-2 border border-red-700">
                <i class="fa-solid fa-house"></i> <span>Go to Homepage</span>
            </a>
            <a href="javascript:history.back()" class="bg-slate-50 text-slate-600 border border-slate-200 py-4 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-slate-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> <span>Go Back</span>
            </a>
        </div>
    </div>

</body>
</html>
