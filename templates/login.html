{% extends "layout.html" %}
{% block content %}

<style>
    /* Smooth Split Entry Animation */
    .slide-in-up { animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(30px); }
    @keyframes slideInUp { to { opacity: 1; transform: translateY(0); } }

    /* New Uniq Input Style */
    .uniq-input {
        background: transparent;
        border: none; border-bottom: 2px solid #E2E8F0;
        border-radius: 0; padding-left: 36px; padding-bottom: 8px;
        transition: all 0.3s ease;
    }
    .uniq-input:focus { border-bottom-color: #E11D48; outline: none; box-shadow: 0 10px 10px -10px rgba(225, 29, 72, 0.1); }
    .input-icon { position: absolute; left: 0; bottom: 12px; color: #94A3B8; transition: all 0.3s ease; }
    .uniq-input:focus ~ .input-icon { color: #E11D48; transform: scale(1.1); }

    /* Floating Auth Card */
    .auth-glass {
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
        border-radius: 32px; box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.8);
    }
</style>

<div class="flex flex-col items-center justify-center min-h-[80vh] py-6 px-4">
    
    <div class="w-full max-w-sm auth-glass p-8 sm:p-10 slide-in-up relative overflow-hidden">
        
        <!-- Abstract Top Shape -->
        <div class="absolute top-0 right-0 w-48 h-48 bg-gradient-to-bl from-red-500 to-rose-400 opacity-10 rounded-bl-full pointer-events-none"></div>

        <!-- 1. Header (Minimalist) -->
        <div class="mb-10 relative z-10">
            <div class="h-12 w-12 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center text-xl mb-4 shadow-sm border border-red-100">
                <i class="fa-solid fa-fingerprint"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight leading-none mb-1.5">Sign In</h2>
            <p class="text-xs font-medium text-slate-500">Access your dashboard</p>
        </div>

        <!-- 2. Login Form -->
        <form method="POST" action="/login" class="space-y-6 relative z-10" id="loginForm" onsubmit="return showLoading()">
            
            <!-- Email Input -->
            <div class="relative flex flex-col justify-end h-14">
                <input type="email" name="email" required class="uniq-input w-full text-sm font-bold text-slate-800 placeholder-slate-300" placeholder="Email Address">
                <i class="fa-regular fa-envelope input-icon"></i>
            </div>
            
            <!-- Password Input -->
            <div class="relative flex flex-col justify-end h-14">
                <input type="password" name="password" id="passwordInput" required class="uniq-input w-full text-sm font-bold tracking-wider text-slate-800 placeholder-slate-300 pr-10" placeholder="Password">
                <i class="fa-solid fa-lock input-icon"></i>
                <button type="button" onclick="togglePassword()" class="absolute right-0 bottom-2 text-slate-400 hover:text-red-600 transition">
                    <i id="eyeIcon" class="fa-regular fa-eye-slash text-sm"></i>
                </button>
            </div>
            
            <!-- Utilities -->
            <div class="flex justify-between items-center pt-2">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" id="remember" class="accent-red-600 h-3.5 w-3.5 cursor-pointer rounded">
                    <span class="text-[10px] font-bold text-slate-500 group-hover:text-slate-700 transition">Remember me</span>
                </label>
                <a href="https://t.me/payrsrp" target="_blank" class="text-[10px] font-bold text-red-600 hover:underline transition">Forgot Password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-red-600 active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">
                <span>Continue</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
        
        <!-- 3. Footer -->
        <div class="mt-8 text-center relative z-10">
            <p class="text-[11px] font-semibold text-slate-500">
                New to GrowEarn? 
                <a href="/register" class="text-red-600 font-black hover:underline ml-1 uppercase tracking-wider">Create Account</a>
            </p>
        </div>

    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('eyeIcon');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
            icon.classList.add('text-red-600');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
            icon.classList.remove('text-red-600');
        }
    }

    function showLoading() {
        const form = document.getElementById('loginForm');
        if(form.checkValidity()) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-lg"></i>';
            btn.classList.add('opacity-80', 'cursor-not-allowed', 'bg-red-600');
            return true;
        }
        return false;
    }
</script>
{% endblock %}
