{% extends "layout.html" %}
{% block content %}

<style>
    /* ==========================================
       PURE DARK THEME & ANIMATIONS
    ========================================== */
    body { background-color: #000000 !important; color: #ffffff !important; }
    
    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Auth Card */
    .auth-card {
        background: #0A0A0A;
        border: 1px solid #1C1C1E;
        border-radius: 32px;
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.02), 0 20px 50px rgba(0,0,0,0.8);
        position: relative;
        overflow: hidden;
    }
    
    /* Modern Input Field */
    .input-group { position: relative; margin-bottom: 20px; }
    .dark-input {
        width: 100%; background: #111111; border: 1px solid #222222;
        color: #ffffff; padding: 18px 18px 18px 46px; border-radius: 16px;
        font-size: 14px; outline: none; transition: all 0.3s ease;
    }
    .dark-input:focus { border-color: #555555; background: #000000; box-shadow: 0 0 0 4px rgba(255,255,255,0.05); }
    .dark-input::placeholder { color: #555555; }
    
    .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #666666; font-size: 14px; transition: color 0.3s ease; }
    .dark-input:focus ~ .input-icon { color: #ffffff; }

    /* White Button */
    .btn-white {
        background: #ffffff; color: #000000; width: 100%; padding: 18px;
        border-radius: 16px; font-weight: 800; font-size: 14px;
        text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-white:active { transform: scale(0.96); background: #e5e5e5; }
</style>

<div class="flex flex-col items-center justify-center min-h-[85vh] py-6 px-4">
    
    <div class="w-full max-w-sm auth-card p-8 sm:p-10 fade-in-up">
        
        <!-- Header -->
        <div class="mb-10 text-center">
            <div class="h-14 w-14 bg-[#111111] text-white rounded-2xl flex items-center justify-center text-2xl mx-auto mb-5 border border-[#222222] shadow-sm">
                <i class="fa-solid fa-fingerprint"></i>
            </div>
            <h2 class="text-3xl font-black text-white tracking-tight mb-2">স্বাগতম</h2>
            <p class="text-xs text-[#888888] font-medium">আপনার পে-লিক্স একাউন্টে লগিন করুন</p>
        </div>

        <!-- Login Form -->
        <form method="POST" action="/login" id="loginForm" onsubmit="return showLoading()">
            
            <div class="input-group">
                <input type="email" name="email" required class="dark-input font-mono" placeholder="Email Address">
                <i class="fa-regular fa-envelope input-icon"></i>
            </div>
            
            <div class="input-group">
                <input type="password" name="password" id="passwordInput" required class="dark-input font-mono tracking-wider" placeholder="Password">
                <i class="fa-solid fa-lock input-icon"></i>
                <button type="button" onclick="togglePassword()" class="absolute right-5 top-1/2 transform -translate-y-1/2 text-[#666666] hover:text-white transition">
                    <i id="eyeIcon" class="fa-regular fa-eye-slash text-sm"></i>
                </button>
            </div>
            
            <div class="flex justify-between items-center mb-8 px-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" id="remember" class="accent-white h-3.5 w-3.5 cursor-pointer rounded bg-[#111] border-[#333]">
                    <span class="text-[10px] font-bold text-[#888888] group-hover:text-white transition">Remember me</span>
                </label>
                <a href="https://t.me/grow_earn" target="_blank" class="text-[10px] font-bold text-white hover:underline transition">Forgot Password?</a>
            </div>

            <button type="submit" id="submitBtn" class="btn-white">
                লগিন করুন <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
        
        <!-- Footer -->
        <div class="mt-8 text-center border-t border-[#1C1C1E] pt-6">
            <p class="text-xs font-medium text-[#666666]">
                একাউন্ট নেই? 
                <a href="/register" class="text-white font-bold hover:underline ml-1">নতুন একাউন্ট খুলুন</a>
            </p>
        </div>

    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('eyeIcon');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
            icon.classList.add('text-white');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
            icon.classList.remove('text-white');
        }
    }

    function showLoading() {
        const form = document.getElementById('loginForm');
        if(form.checkValidity()) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-lg"></i>';
            btn.style.background = "#333333";
            btn.style.color = "#ffffff";
            return true;
        }
        return false;
    }
</script>
{% endblock %}
