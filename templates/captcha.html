{% extends "layout.html" %}
{% block content %}

<style>
    body { background-color: #000000 !important; color: #ffffff !important; }
    .fade-in-up { animation: fadeInUp 0.5s forwards; opacity: 0; transform: translateY(15px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Captcha Box (Unreadable for bots, dark for users) */
    .captcha-box {
        background-color: #0A0A0A;
        background-image: radial-gradient(#333333 2px, transparent 2px), radial-gradient(#222222 2px, transparent 2px);
        background-size: 20px 20px; background-position: 0 0, 10px 10px;
        user-select: none; border: 1px solid #1C1C1E;
    }

    .dark-input {
        width: 100%; background: #111111; border: 1px solid #222222;
        color: #ffffff; padding: 20px; border-radius: 16px; text-align: center;
        font-size: 20px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
        outline: none; transition: all 0.3s ease;
    }
    .dark-input:focus { border-color: #ffffff; background: #000000; }

    .btn-white {
        background: #ffffff; color: #000000; width: 100%; padding: 18px;
        border-radius: 16px; font-weight: 800; font-size: 13px; text-transform: uppercase;
        letter-spacing: 1px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-white:active { transform: scale(0.96); background: #e5e5e5; }
    .btn-white:disabled { background: #222222; color: #666666; cursor: not-allowed; transform: none; }
</style>

<div class="max-w-md mx-auto space-y-6 fade-in-up pb-10 px-2 mt-4">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <a href="/work" class="h-10 w-10 bg-[#111111] rounded-full flex items-center justify-center text-white hover:bg-[#1A1A1A] transition border border-[#1C1C1E]">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </a>
        <h2 class="text-lg font-bold text-white tracking-wide">ক্যাপচা</h2>
        <div class="w-10"></div> 
    </div>

    <!-- Status -->
    <div class="bg-[#0A0A0A] border border-[#1C1C1E] rounded-3xl p-6 flex items-center justify-between">
        <div>
            <p class="text-[10px] text-[#888888] font-bold uppercase tracking-widest mb-1">Daily Target</p>
            <p class="text-xs font-medium text-white">কোড লিখুন এবং ১ টাকা পান</p>
        </div>
        <div class="text-right">
            <p class="text-2xl font-black font-mono text-white leading-none">{{ count }}<span class="text-sm text-[#444444]">/10</span></p>
        </div>
    </div>

    <!-- Captcha Form -->
    <form method="POST" class="bg-[#0A0A0A] p-6 sm:p-8 rounded-3xl border border-[#1C1C1E]" onsubmit="return showSubmitLoader()">
        
        <p class="text-center text-[10px] text-[#666666] font-bold uppercase tracking-widest mb-4">Captcha Code</p>
        
        <!-- Code Display -->
        <div class="captcha-box rounded-2xl py-10 px-4 text-center mb-6 relative overflow-hidden">
            <div class="absolute top-1/2 left-0 w-full h-0.5 bg-[#444444] transform -rotate-6 pointer-events-none"></div>
            <h1 class="text-4xl font-black text-white tracking-[0.4em] font-mono italic mix-blend-screen drop-shadow-lg">
                {{ captcha_text }}
            </h1>
        </div>

        <!-- Input -->
        <div class="mb-6">
            <input type="text" name="captcha_input" id="captchaInput" required autocomplete="off" placeholder="CODE" class="dark-input">
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="btn-white">
            <span>Verify Code</span> <i class="fa-solid fa-arrow-right"></i>
        </button>
        
        <p class="text-center text-[9px] text-[#444444] font-bold uppercase tracking-widest mt-6 font-mono">
            Secured Validation
        </p>
    </form>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => { setTimeout(() => { document.getElementById('captchaInput').focus(); }, 300); });
    function showSubmitLoader() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
        btn.style.background = "#222222"; btn.style.color = "#ffffff";
        return true;
    }
</script>

{% endblock %}
