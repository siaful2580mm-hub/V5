{% extends "layout.html" %}
{% block content %}

<div class="max-w-4xl mx-auto space-y-8 pb-20 pt-4 px-1">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-slate-900 to-slate-800 p-6 rounded-[24px] text-white shadow-lg flex items-center gap-4">
        <div class="h-14 w-14 bg-emerald-500/20 text-emerald-400 rounded-xl flex items-center justify-center text-3xl border border-emerald-500/30">
            <i class="fa-brands fa-google-play"></i>
        </div>
        <div>
            <h2 class="text-2xl font-black tracking-tight">Play Store Tasks</h2>
            <p class="text-xs text-slate-400 font-medium">Add App Install & Review Tasks</p>
        </div>
    </div>

    <!-- Add Task Form -->
    <div class="bg-white p-6 sm:p-8 rounded-[24px] shadow-sm border border-slate-100 border-l-4 border-l-emerald-500">
        <h3 class="font-bold text-slate-800 text-sm mb-5 uppercase tracking-widest"><i class="fa-solid fa-plus text-emerald-500"></i> Create New App Task</h3>
        
        <form method="POST" action="/adtask/play" class="space-y-4">
            <div>
                <input type="text" name="title" required placeholder="App Name (Ex: Earn Daily App)" class="w-full p-4 border border-slate-200 rounded-[16px] focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 bg-slate-50 focus:bg-white text-sm font-bold text-slate-800">
            </div>
            <div>
                <textarea name="description" required rows="3" placeholder="Instructions (Ex: Download the app, give 5 star rating and write a good review)" class="w-full p-4 border border-slate-200 rounded-[16px] focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 bg-slate-50 focus:bg-white text-sm font-medium text-slate-700 resize-none"></textarea>
            </div>
            <div class="grid sm:grid-cols-2 gap-4">
                <input type="url" name="link" required placeholder="Play Store Link (https://play.google.com/...)" class="w-full p-4 border border-slate-200 rounded-[16px] focus:outline-none focus:border-emerald-500 bg-slate-50 focus:bg-white text-sm font-mono text-slate-800">
                <input type="number" step="0.01" name="reward" required placeholder="Reward Amount (৳)" class="w-full p-4 border border-slate-200 rounded-[16px] focus:outline-none focus:border-emerald-500 bg-slate-50 focus:bg-white text-sm font-black text-slate-800">
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-[14px] font-black text-xs uppercase tracking-widest shadow-lg hover:bg-emerald-700 active:scale-95 transition-all mt-2">
                Publish Task
            </button>
        </form>
    </div>

    <!-- Existing Tasks List -->
    <div class="bg-white rounded-[24px] shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left text-sm whitespace-nowrap">
            <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-black tracking-widest border-b border-slate-100">
                <tr><th class="p-4">App Title</th><th class="p-4">Reward</th><th class="p-4 text-center">Action</th></tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                {% for task in tasks %}
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 font-bold text-slate-800">{{ task.title }}</td>
                    <td class="p-4"><span class="bg-emerald-50 text-emerald-600 px-2.5 py-1 rounded-md font-bold text-xs border border-emerald-100">৳{{ task.reward }}</span></td>
                    <td class="p-4 text-center">
                        <a href="/admin/task/delete/{{ task.id }}" onclick="return confirm('Delete this task?')" class="inline-flex h-8 w-8 bg-red-50 text-red-500 rounded-lg items-center justify-center hover:bg-red-500 hover:text-white transition shadow-sm"><i class="fa-solid fa-trash-can text-xs"></i></a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
