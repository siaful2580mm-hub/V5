{% extends "layout.html" %}
{% block content %}

<style>
    /* ==========================================
       PURE DARK THEME & ANIMATIONS
    ========================================== */
    body { background-color: #000000 !important; color: #ffffff !important; }
    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Shimmer Effect Box */
    .shimmer-box { position: relative; overflow: hidden; }
    .shimmer-box::after {
        content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
        transform: skewX(-20deg); animation: shimmerFast 3s infinite; pointer-events: none;
    }
    @keyframes shimmerFast { 100% { left: 200%; } }

    /* Floating Icon */
    .float-icon { animation: floatIcon 3s ease-in-out infinite; }
    @keyframes floatIcon {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
    }

    /* White Button */
    .btn-white {
        background: #ffffff; color: #000000; padding: 18px 32px;
        border-radius: 16px; font-weight: 800; font-size: 12px; text-transform: uppercase;
        letter-spacing: 1px; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-white:active { transform: scale(0.96); background: #e5e5e5; }
</style>

<div class="max-w-md mx-auto space-y-6 fade-in-up pb-10 px-2 mt-4">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <a href="/work" class="h-10 w-10 bg-[#111111] rounded-full flex items-center justify-center text-white hover:bg-[#1A1A1A] transition border border-[#1C1C1E]">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </a>
        <h2 class="text-lg font-bold text-white tracking-wide">স্পেশাল টাস্ক</h2>
        <div class="w-10"></div> 
    </div>

    <!-- Coming Soon Card -->
    <div class="bg-[#0A0A0A] rounded-[32px] p-10 text-center border border-[#1C1C1E] shadow-2xl relative overflow-hidden shimmer-box">
        
        <!-- Ambient Glow -->
        <div class="absolute top-0 right-0 w-48 h-48 bg-white/5 rounded-bl-full blur-2xl pointer-events-none"></div>
        
        <div class="relative z-10 flex flex-col items-center">
            
            <!-- Animated Icon -->
            <div class="h-20 w-20 bg-[#111] border border-[#222] rounded-2xl flex items-center justify-center text-4xl mb-6 text-white float-icon shadow-lg">
                <i class="fa-solid fa-lock"></i>
            </div>
            
            <span class="text-[9px] font-black uppercase tracking-[0.2em] text-[#888] mb-2 bg-[#111] px-3 py-1.5 rounded-full border border-[#222]">
                Work in Progress
            </span>
            
            <h2 class="text-3xl font-black mb-3 tracking-tight text-white">Coming Soon!</h2>
            
            <p class="text-xs text-[#666] font-medium leading-relaxed mb-8">
                এই স্পেশাল টাস্ক সেকশনটির কাজ বর্তমানে চলছে। খুব শীঘ্রই এখানে অত্যন্ত আকর্ষণীয় এবং হাই-পেইং কাজ যুক্ত করা হবে।
            </p>
            
            <a href="/work" class="btn-white">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </a>
            
        </div>
    </div>

</div>

{% endblock %}
