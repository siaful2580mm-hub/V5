{% extends "layout.html" %}
{% block content %}

<style>
    /* ==========================================
       PURE DARK THEME & ANIMATIONS
    ========================================== */
    body { background-color: #000000 !important; color: #ffffff !important; }
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Dark Cards */
    .dark-card {
        background: #0A0A0A; border: 1px solid #1C1C1E; border-radius: 32px;
        padding: 32px 20px; position: relative; overflow: hidden; text-align: center;
    }

    /* 3D Scratch Card Container (Dark Theme) */
    .scratch-container {
        position: relative; 
        width: 280px; height: 280px; margin: 0 auto;
        border-radius: 32px; overflow: hidden;
        box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.8), inset 0 0 0 4px rgba(255, 255, 255, 0.05);
        background: #000000; transform: translateZ(0); 
    }
    
    /* The Reward Behind the Canvas */
    .scratch-reward {
        position: absolute; inset: 0;
        background: #0A0A0A;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 1; border: 2px solid #222222; border-radius: 32px;
    }
    
    /* The Canvas (Dark Silver cover to scratch off) */
    canvas {
        position: absolute; inset: 0; z-index: 2;
        cursor: crosshair; touch-action: none;
        border-radius: 32px;
    }

    /* Button */
    .btn-white {
        background: #ffffff; color: #000000; width: 100%; padding: 18px;
        border-radius: 16px; font-weight: 800; font-size: 13px; text-transform: uppercase;
        letter-spacing: 1px; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-white:active { transform: scale(0.96); background: #e5e5e5; }
</style>

<div class="max-w-md mx-auto space-y-6 fade-in-up pb-10 px-2 mt-4">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <a href="/work" class="h-10 w-10 bg-[#111111] rounded-full flex items-center justify-center text-white hover:bg-[#1A1A1A] transition border border-[#1C1C1E]">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </a>
        <h2 class="text-lg font-bold text-white tracking-wide">স্ক্র্যাচ কার্ড</h2>
        <div class="w-10"></div> 
    </div>

    <!-- Hype Banner -->
    <div class="dark-card !text-left flex items-center justify-between">
        <div>
            <span class="bg-[#111] text-[#888] px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-[#222] mb-2 inline-block">
                Daily Reward
            </span>
            <h2 class="text-xl font-black text-white tracking-tight mb-1">Win Instant Cash</h2>
            <p class="text-[10px] text-[#666] font-medium">কার্ড ঘষে আপনার ভাগ্য পরীক্ষা করুন।</p>
        </div>
        <div class="bg-[#111] border border-[#222] p-3 rounded-2xl text-center shadow-inner">
            <span class="text-[8px] font-bold uppercase tracking-widest text-[#666] block mb-0.5">Today</span>
            <span class="text-lg font-black font-mono text-white">{{ count }}<span class="text-xs text-[#555]">/3</span></span>
        </div>
    </div>

    <!-- Interactive Scratch Area -->
    <div class="dark-card">
        <h3 class="font-black text-white mb-6 uppercase tracking-widest text-xs flex items-center justify-center gap-2">
            <i class="fa-solid fa-hand-pointer text-[#888] animate-bounce"></i> Scratch Below
        </h3>
        
        <!-- The Scratch Card -->
        <div class="scratch-container" id="scratchContainer">
            <div class="scratch-reward">
                <div class="h-14 w-14 bg-[#111] border border-[#222] rounded-full flex items-center justify-center mb-3">
                    <i class="fa-solid fa-gift text-white text-2xl"></i>
                </div>
                <p class="text-[10px] font-black text-[#666] uppercase tracking-widest mb-1">You Won!</p>
                <h1 id="rewardAmount" class="text-4xl font-black text-white font-mono tracking-tighter">???</h1>
            </div>
            <canvas id="scratchCanvas"></canvas>
        </div>
        
        <!-- Success Message -->
        <div id="claimMsg" class="mt-8 text-xs font-bold text-black hidden bg-white p-4 rounded-2xl border border-white shadow-lg flex items-center justify-center gap-2">
            <i class="fa-solid fa-check-circle"></i>
            <span>৳<span id="amountText" class="font-mono text-sm"></span> ব্যালেন্সে যোগ হয়েছে!</span>
        </div>
    </div>

</div>

<!-- HTML5 Canvas Scratch Logic -->
<script>
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const container = document.getElementById('scratchContainer');
    let isDrawing = false;
    let isRevealed = false;

    function initCanvas() {
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;

        // Dark Silver Background
        ctx.fillStyle = '#1C1C1E'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Text
        ctx.fillStyle = '#555555'; 
        ctx.font = '900 20px Inter, monospace';
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("SCRATCH HERE", canvas.width/2, canvas.height/2);
        
        // Noise pattern
        for(let i=0; i<400; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? '#222222' : '#111111';
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
        }
    }
    
    setTimeout(initCanvas, 50);

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        return { x, y };
    };

    const startDraw = (e) => { if(isRevealed) return; isDrawing = true; scratch(e); };
    const endDraw = () => { isDrawing = false; checkClear(); };
    
    const scratch = (e) => {
        if (!isDrawing || isRevealed) return;
        e.preventDefault(); 
        const { x, y } = getPos(e);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.fill();
    };

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    
    canvas.addEventListener('touchstart', startDraw, {passive: false});
    canvas.addEventListener('touchmove', scratch, {passive: false});
    canvas.addEventListener('touchend', endDraw);

    function checkClear() {
        if(isRevealed) return;
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let clearPixels = 0;
        for(let i = 3; i < imageData.data.length; i += 4) { if(imageData.data[i] === 0) clearPixels++; }
        
        const clearPercentage = (clearPixels / (canvas.width * canvas.height)) * 100;
        if(clearPercentage > 45) {
            isRevealed = true;
            canvas.style.transition = 'opacity 0.6s ease-out';
            canvas.style.opacity = '0';
            fetchReward();
        }
    }

    function fetchReward() {
        fetch('/skatch', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                document.getElementById('rewardAmount').innerText = '৳' + data.reward;
                document.getElementById('amountText').innerText = data.reward;
                document.getElementById('claimMsg').classList.remove('hidden');
                setTimeout(() => location.reload(), 3000);
            } else {
                alert(data.message);
                location.reload();
            }
        }).catch(err => { location.reload(); });
    }
</script>

{% endblock %}
