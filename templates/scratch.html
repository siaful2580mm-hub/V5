{% extends "layout.html" %}
{% block content %}

<style>
    /* Premium Entry Animations */
    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* 3D Scratch Card Container */
    .scratch-container {
        position: relative; 
        width: 300px; height: 300px; margin: 0 auto;
        border-radius: 32px; overflow: hidden;
        box-shadow: 0 20px 50px -10px rgba(225, 29, 72, 0.3), inset 0 0 0 6px rgba(255, 255, 255, 0.2);
        background: #ffffff; /* Fallback */
        transform: translateZ(0); /* Hardware acceleration for smooth scratch */
    }
    
    /* The Reward Behind the Canvas (Red/Gold Theme) */
    .scratch-reward {
        position: absolute; inset: 0;
        background: radial-gradient(circle at center, #FFF1F2 0%, #FECDD3 100%);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 1; border: 4px solid #E11D48; border-radius: 32px;
    }
    
    /* The Canvas (Silver cover to scratch off) */
    canvas {
        position: absolute; inset: 0; z-index: 2;
        cursor: crosshair; touch-action: none;
        border-radius: 32px;
    }

    /* Shimmer Effect for the Header */
    .shimmer-text {
        background: linear-gradient(to right, #FCD34D, #FFFBEB, #FCD34D);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        animation: shine 2s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }
</style>

<div class="max-w-xl mx-auto px-1 pb-8 fade-in-up mt-2">

    <!-- ==========================================
         1. PAGE HEADER (Navigation)
    ========================================== -->
    <div class="flex items-center gap-4 mb-6 px-2">
        <a href="/work" class="h-10 w-10 bg-white rounded-xl flex items-center justify-center text-slate-500 shadow-sm border border-slate-100 hover:text-red-600 hover:bg-red-50 transition-all active:scale-95">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="text-2xl font-black text-slate-800 tracking-tight leading-none">Scratch & Win</h2>
            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mt-1">Daily Lucky Reward</p>
        </div>
    </div>

    <!-- ==========================================
         2. HYPE BANNER (Dark Red Gradient)
    ========================================== -->
    <div class="bg-gradient-to-br from-slate-900 via-slate-800 to-red-900 rounded-[32px] p-8 text-white text-center shadow-xl relative overflow-hidden mb-8 border border-slate-700">
        
        <!-- Ambient Decor -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/20 rounded-bl-full blur-2xl"></div>
        <i class="fa-solid fa-ticket absolute left-4 top-1/2 transform -translate-y-1/2 text-8xl opacity-10 -rotate-12 pointer-events-none"></i>
        
        <div class="relative z-10">
            <span class="bg-gradient-to-r from-amber-400 to-amber-500 text-slate-900 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-md inline-flex items-center gap-1.5 mb-3 border border-amber-300">
                <i class="fa-solid fa-fire"></i> Hot Offer
            </span>
            
            <h2 class="text-3xl sm:text-4xl font-black shimmer-text tracking-tight mb-2">WIN UP TO ৳100!</h2>
            
            <p class="text-xs text-red-100 font-medium max-w-[250px] mx-auto leading-relaxed">
                কার্ড ঘষে আপনার ভাগ্য পরীক্ষা করুন এবং ইনস্ট্যান্ট ক্যাশ জিতে নিন।
            </p>
            
            <div class="mt-5 inline-flex items-center justify-center gap-2 bg-black/30 backdrop-blur-md px-5 py-2.5 rounded-xl border border-white/10 shadow-inner">
                <i class="fa-solid fa-gamepad text-slate-400"></i>
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-300">Today's Limit:</span>
                <span class="text-sm font-black font-mono text-white">{{ count }}/3</span>
            </div>
        </div>
    </div>

    <!-- ==========================================
         3. INTERACTIVE SCRATCH AREA
    ========================================== -->
    <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
        <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-red-600 rounded-l-[32px] hidden md:block"></div>

        <h3 class="font-black text-slate-800 mb-6 uppercase tracking-widest text-sm flex items-center justify-center gap-2">
            <i class="fa-solid fa-hand-pointer text-red-500 animate-bounce"></i> Scratch the card below
        </h3>
        
        <!-- The Scratch Card -->
        <div class="scratch-container" id="scratchContainer">
            <!-- Background (Reward) -->
            <div class="scratch-reward">
                <div class="h-16 w-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-3">
                    <i class="fa-solid fa-gift text-red-500 text-3xl"></i>
                </div>
                <p class="text-[10px] font-black text-red-400 uppercase tracking-widest mb-0.5">You Won!</p>
                <h1 id="rewardAmount" class="text-5xl font-black text-red-600 font-mono tracking-tighter drop-shadow-md">???</h1>
            </div>
            
            <!-- Foreground Canvas (Silver Coating) -->
            <canvas id="scratchCanvas"></canvas>
        </div>
        
        <!-- Success Message (Hidden until scratched) -->
        <div id="claimMsg" class="mt-8 text-sm font-bold text-green-700 hidden bg-green-50 p-4 rounded-2xl border border-green-200 shadow-sm flex items-center justify-center gap-2">
            <div class="h-6 w-6 bg-green-500 text-white rounded-full flex items-center justify-center text-xs"><i class="fa-solid fa-check"></i></div>
            <span>৳<span id="amountText" class="font-mono text-lg"></span> ব্যালেন্সে যোগ হয়েছে!</span>
        </div>
    </div>

</div>

<!-- ==========================================
     SCRATCH LOGIC (HTML5 Canvas)
========================================== -->
<script>
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const container = document.getElementById('scratchContainer');
    let isDrawing = false;
    let isRevealed = false;

    // 1. Setup Canvas Size & Silver Coating
    function initCanvas() {
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;

        // Draw Silver Background
        ctx.fillStyle = '#CBD5E1'; // Slate-300
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Add "SCRATCH HERE" Text
        ctx.fillStyle = '#64748B'; // Slate-500
        ctx.font = '900 24px Inter, sans-serif';
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("SCRATCH HERE", canvas.width/2, canvas.height/2);
        
        // Add noise/pattern
        for(let i=0; i<500; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? '#E2E8F0' : '#94A3B8';
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
        }
    }
    
    setTimeout(initCanvas, 50);

    // 2. Mouse/Touch Events
    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        return { x, y };
    };

    const startDraw = (e) => { 
        if(isRevealed) return;
        isDrawing = true; 
        scratch(e); 
    };
    const endDraw = () => { 
        isDrawing = false; 
        checkClear(); 
    };
    
    const scratch = (e) => {
        if (!isDrawing || isRevealed) return;
        e.preventDefault(); 
        
        const { x, y } = getPos(e);
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2); // 30px brush radius
        ctx.fill();
    };

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    
    canvas.addEventListener('touchstart', startDraw, {passive: false});
    canvas.addEventListener('touchmove', scratch, {passive: false});
    canvas.addEventListener('touchend', endDraw);

    // 3. Auto Reveal Logic
    function checkClear() {
        if(isRevealed) return;
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let clearPixels = 0;
        
        // Check alpha channel
        for(let i = 3; i < imageData.data.length; i += 4) {
            if(imageData.data[i] === 0) clearPixels++; 
        }
        
        const clearPercentage = (clearPixels / (canvas.width * canvas.height)) * 100;
        
        if(clearPercentage > 45) { // Reveal if 45% cleared
            isRevealed = true;
            canvas.style.transition = 'opacity 0.6s ease-out';
            canvas.style.opacity = '0';
            fetchReward();
        }
    }

    // 4. Backend AJAX Call (Fetch Reward)
    function fetchReward() {
        fetch('/skatch', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                document.getElementById('rewardAmount').innerText = '৳' + data.reward;
                document.getElementById('amountText').innerText = data.reward;
                
                const msgBox = document.getElementById('claimMsg');
                msgBox.classList.remove('hidden');
                msgBox.classList.add('fade-in-up');
                
                setTimeout(() => location.reload(), 3000);
            } else {
                alert(data.message);
                location.reload();
            }
        })
        .catch(err => {
            console.error(err);
            alert("Connection error! Please try again.");
            location.reload();
        });
    }
</script>

{% endblock %}
