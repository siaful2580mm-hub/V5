{% extends "layout.html" %}
{% block content %}

<style>
    /* ==========================================
       PURE DARK THEME & ANIMATIONS
    ========================================== */
    body { background-color: #000000 !important; color: #ffffff !important; }
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Dark Cards */
    .dark-card {
        background: #0A0A0A; border: 1px solid #1C1C1E; border-radius: 32px;
        padding: 32px 20px; position: relative; overflow: hidden; text-align: center;
    }

    /* Monochrome Spin Wheel */
    .wheel-container {
        position: relative; width: 280px; height: 280px; margin: 0 auto;
        border-radius: 50%; padding: 8px;
        background: #111111;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255, 255, 255, 0.05);
    }
    .wheel-border {
        position: relative; width: 100%; height: 100%; border-radius: 50%;
        border: 4px solid #ffffff; overflow: hidden;
    }
    .wheel {
        width: 100%; height: 100%; border-radius: 50%;
        /* Dark Grayscale Conic Gradient */
        background: conic-gradient(
            #333333 0deg 60deg,    
            #111111 60deg 120deg,  
            #444444 120deg 180deg, 
            #222222 180deg 240deg, 
            #555555 240deg 300deg, 
            #000000 300deg 360deg  
        );
        transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1);
        position: relative;
    }
    
    /* Pointer */
    .pointer {
        position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
        font-size: 32px; color: #ffffff; z-index: 10;
        text-shadow: 0 4px 6px rgba(0,0,0,0.8);
    }

    /* Center Hub */
    .wheel-center {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 36px; height: 36px; background: #ffffff; border-radius: 50%;
        z-index: 5; border: 4px solid #000000;
    }

    /* Wheel Text */
    .wheel-text { 
        position: absolute; color: #ffffff; font-weight: 900; font-size: 16px; 
        font-family: monospace; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .t1 { top: 15%; left: 65%; transform: rotate(30deg); }
    .t2 { top: 45%; right: 10%; transform: rotate(90deg); }
    .t3 { bottom: 15%; right: 25%; transform: rotate(150deg); }
    .t4 { bottom: 15%; left: 25%; transform: rotate(210deg); }
    .t5 { top: 45%; left: 10%; transform: rotate(270deg); }
    .t6 { top: 15%; left: 25%; transform: rotate(330deg); }

    /* Button */
    .btn-white {
        background: #ffffff; color: #000000; width: 100%; padding: 18px;
        border-radius: 16px; font-weight: 800; font-size: 14px; text-transform: uppercase;
        letter-spacing: 1px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-white:active { transform: scale(0.96); background: #e5e5e5; }
    .btn-white:disabled { background: #222222; color: #666666; cursor: not-allowed; }
</style>

<div class="max-w-md mx-auto space-y-6 fade-in-up pb-10 px-2 mt-4">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <a href="/work" class="h-10 w-10 bg-[#111111] rounded-full flex items-center justify-center text-white hover:bg-[#1A1A1A] transition border border-[#1C1C1E]">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </a>
        <h2 class="text-lg font-bold text-white tracking-wide">লাকি স্পিন</h2>
        <div class="w-10"></div> 
    </div>

    <!-- Main Card -->
    <div class="dark-card">
        
        <div class="mb-8 relative z-10">
            <h3 class="font-black text-white text-lg flex items-center justify-center gap-2 uppercase tracking-widest">
                ভাগ্যের চাকা
            </h3>
            <p class="text-[10px] text-[#888888] mt-1 font-bold">প্রতিদিন একবার সম্পূর্ণ ফ্রিতে স্পিন করুন</p>
        </div>

        <!-- 3D Monochrome Spin Wheel -->
        <div class="wheel-container mb-10 relative z-10">
            <div class="pointer"><i class="fa-solid fa-location-dot"></i></div>
            
            <div class="wheel-border">
                <div class="wheel" id="wheel">
                    <div class="wheel-text t1">৳১০</div>
                    <div class="wheel-text t2">৳০</div>
                    <div class="wheel-text t3">৳৫</div>
                    <div class="wheel-text t4">৳১</div>
                    <div class="wheel-text t5">৳২</div>
                    <div class="wheel-text t6">৳৩</div>
                </div>
            </div>
            
            <div class="wheel-center"></div>
        </div>

        <!-- Controls & Results -->
        <div class="relative z-10">
            {% if can_spin %}
                <button id="spinBtn" onclick="spinWheel()" class="btn-white">
                    <span>Spin Now</span>
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            {% else %}
                <button disabled class="btn-white">
                    <i class="fa-solid fa-lock"></i> আজকের স্পিন শেষ
                </button>
                <p class="text-[10px] text-[#666666] mt-4 font-bold">
                    <i class="fa-regular fa-clock"></i> আগামীকাল আবার চেষ্টা করুন!
                </p>
            {% endif %}
            
            <!-- Result Message Area -->
            <div id="resultMsgBox" class="mt-6 p-4 rounded-2xl hidden transition-all border">
                <p id="resultMsg" class="font-bold text-sm"></p>
            </div>
        </div>
    </div>

</div>

<!-- Spin Logic -->
<script>
    function spinWheel() {
        const btn = document.getElementById('spinBtn');
        const wheel = document.getElementById('wheel');
        const msgBox = document.getElementById('resultMsgBox');
        const msgText = document.getElementById('resultMsg');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
        btn.style.background = "#222222"; btn.style.color = "#ffffff";

        fetch('/spin', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                let degrees = 3600; 
                if(data.reward === 10) degrees += 330;
                else if(data.reward === 0) degrees += 270;
                else if(data.reward === 5) degrees += 210;
                else if(data.reward === 1) degrees += 150;
                else if(data.reward === 2) degrees += 90;
                else if(data.reward === 3) degrees += 30;

                wheel.style.transform = `rotate(${degrees}deg)`;

                setTimeout(() => {
                    msgBox.classList.remove('hidden');
                    if(data.reward > 0) {
                        msgBox.className = "mt-6 p-4 rounded-2xl bg-white text-black border border-white text-center shadow-lg";
                        msgText.innerHTML = `অভিনন্দন! আপনি <b class="font-mono text-lg">৳${data.reward}</b> পেয়েছেন!`;
                    } else {
                        msgBox.className = "mt-6 p-4 rounded-2xl bg-[#111] border border-[#333] text-center";
                        msgText.innerHTML = `<span class="text-[#888]">Better Luck Next Time!</span>`;
                    }
                    setTimeout(() => location.reload(), 3000); 
                }, 4000); 
                
            } else {
                alert(data.message);
                location.reload();
            }
        })
        .catch(err => {
            alert("Connection error. Please try again.");
            location.reload();
        });
    }
</script>

{% endblock %}
