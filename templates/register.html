{% extends "layout.html" %}
{% block content %}

<!-- ThumbmarkJS for Device Fingerprinting (Security) -->
<script src="https://cdn.jsdelivr.net/npm/@thumbmarkjs/thumbmarkjs/dist/thumbmark.umd.js"></script>

<style>
    /* ==========================================
       PURE DARK THEME & ANIMATIONS
    ========================================== */
    body { background-color: #000000 !important; color: #ffffff !important; }
    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Auth Card */
    .auth-card {
        background: #0A0A0A; border: 1px solid #1C1C1E; border-radius: 32px;
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.02), 0 20px 50px rgba(0,0,0,0.8);
    }
    
    /* Modern Input */
    .input-group { position: relative; margin-bottom: 16px; }
    .dark-input {
        width: 100%; background: #111111; border: 1px solid #222222;
        color: #ffffff; padding: 16px 16px 16px 46px; border-radius: 16px;
        font-size: 13px; outline: none; transition: all 0.3s ease;
        appearance: none;
    }
    .dark-input:focus { border-color: #555555; background: #000000; box-shadow: 0 0 0 4px rgba(255,255,255,0.05); }
    .dark-input::placeholder { color: #555555; }
    
    .dark-input.error-border { border-color: #4A0000; }
    
    .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #666666; font-size: 14px; transition: color 0.3s ease; }
    .dark-input:focus ~ .input-icon { color: #ffffff; }

    /* White Button */
    .btn-white {
        background: #ffffff; color: #000000; width: 100%; padding: 18px;
        border-radius: 16px; font-weight: 800; font-size: 13px;
        text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease;
        display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px;
    }
    .btn-white:active { transform: scale(0.96); background: #e5e5e5; }
</style>

<div class="flex flex-col items-center justify-center min-h-[90vh] py-6 px-4">
    
    <div class="w-full max-w-sm auth-card p-8 sm:p-10 fade-in-up">

        <!-- Header -->
        <div class="mb-8 text-center">
            <div class="h-12 w-12 bg-[#111111] text-white rounded-2xl flex items-center justify-center text-xl mx-auto mb-4 border border-[#222222]">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2 class="text-2xl font-black text-white tracking-tight mb-1">একাউন্ট তৈরি করুন</h2>
            <p class="text-[11px] text-[#888888] font-medium">নিরাপদ এবং ভেরিফাইড সিস্টেমে যুক্ত হোন</p>
        </div>

        <!-- Security Warning -->
        <div class="bg-[#111111] border border-[#222222] p-3 mb-6 rounded-xl text-center">
            <p class="text-[9px] text-[#AAAAAA] font-bold leading-relaxed uppercase tracking-wider">
                <i class="fa-solid fa-shield-halved text-white mr-1"></i> ১টি ডিভাইসে ১টির বেশি একাউন্ট নিষিদ্ধ
            </p>
        </div>

        <!-- Register Form -->
        <form id="registerForm" method="POST" action="/register">
            
            <input type="hidden" name="ref_code" value="{{ ref_code if ref_code else '' }}">
            <input type="hidden" name="device_id" id="deviceIdInput" value="">

            <!-- Name -->
            <div class="input-group">
                <input type="text" name="name" required class="dark-input" placeholder="Full Name">
                <i class="fa-regular fa-user input-icon"></i>
            </div>

            <!-- Phone -->
            <div class="input-group">
                <input type="tel" name="phone" id="phoneInput" required class="dark-input font-mono tracking-wider" placeholder="017XXXXXXXX">
                <i class="fa-solid fa-mobile-screen input-icon text-[13px]"></i>
                <p class="text-[9px] font-bold text-[#FF453A] mt-1.5 hidden" id="phoneError">সঠিক ১১ ডিজিটের নাম্বার দিন</p>
            </div>

            <!-- Email -->
            <div class="input-group">
                <input type="email" name="email" id="emailInput" required class="dark-input font-mono" placeholder="yourmail@gmail.com">
                <i class="fa-brands fa-google input-icon"></i>
                <p class="text-[9px] font-bold text-[#FF453A] mt-1.5 hidden" id="emailError">শুধুমাত্র @gmail.com গ্রহণযোগ্য</p>
            </div>
            
            <!-- Password (Simple, No Complex Validation) -->
            <div class="input-group !mb-0">
                <input type="password" name="password" required minlength="6" class="dark-input font-mono tracking-wider" placeholder="Create Password (Min 6 chars)">
                <i class="fa-solid fa-lock input-icon"></i>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="btn-white">
                রেজিস্ট্রেশন সম্পূর্ণ করুন <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <!-- Footer / Login Link -->
        <div class="mt-8 pt-6 border-t border-[#1C1C1E] text-center">
            <p class="text-[11px] font-medium text-[#666666]">
                ইতিমধ্যে একাউন্ট আছে? 
                <a href="/login" class="text-white font-bold hover:underline ml-1">লগিন করুন</a>
            </p>
        </div>

    </div>
</div>

<script>
    // Live Input Validation (Only for Email & Phone)
    const emailInput = document.getElementById('emailInput');
    const emailError = document.getElementById('emailError');
    emailInput.addEventListener('input', function() {
        if(this.value.length > 0 && !this.value.endsWith('@gmail.com')) {
            emailError.classList.remove('hidden');
            this.classList.add('error-border');
        } else {
            emailError.classList.add('hidden');
            this.classList.remove('error-border');
        }
    });

    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');
    phoneInput.addEventListener('input', function() {
        const regex = /^01[3-9][0-9]{8}$/;
        if(this.value.length > 0 && !regex.test(this.value)) {
            phoneError.classList.remove('hidden');
            this.classList.add('error-border');
        } else {
            phoneError.classList.add('hidden');
            this.classList.remove('error-border');
        }
    });

    // ThumbmarkJS Submit (Device Tracking)
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        // Disable button
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-lg"></i>';
        btn.style.background = "#333333";
        btn.style.color = "#ffffff";

        // Get Device Fingerprint & Submit
        ThumbmarkJS.getFingerprint().then(function(fp) {
            document.getElementById('deviceIdInput').value = fp;
            document.getElementById('registerForm').submit();
        }).catch(function(err) {
            document.getElementById('registerForm').submit();
        });
    });
</script>
{% endblock %}
