{% extends "layout.html" %}
{% block content %}

<!-- ThumbmarkJS for Device Fingerprinting -->
<script src="https://cdn.jsdelivr.net/npm/@thumbmarkjs/thumbmarkjs/dist/thumbmark.umd.js"></script>

<style>
    /* Smooth Split Entry Animation */
    .slide-in-up { animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(30px); }
    @keyframes slideInUp { to { opacity: 1; transform: translateY(0); } }

    /* New Uniq Input Style */
    .uniq-input {
        background: transparent;
        border: none; border-bottom: 2px solid #E2E8F0;
        border-radius: 0; padding-left: 36px; padding-bottom: 8px;
        transition: all 0.3s ease;
    }
    .uniq-input:focus { border-bottom-color: #E11D48; outline: none; box-shadow: 0 10px 10px -10px rgba(225, 29, 72, 0.1); }
    .uniq-input:invalid:focus { border-bottom-color: #EF4444; }
    
    .input-icon { position: absolute; left: 0; bottom: 12px; color: #94A3B8; transition: all 0.3s ease; }
    .uniq-input:focus ~ .input-icon { color: #E11D48; transform: scale(1.1); }

    /* Floating Auth Card */
    .auth-glass {
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
        border-radius: 32px; box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.8);
    }
</style>

<div class="flex flex-col items-center justify-center min-h-[80vh] py-6 px-4">
    
    <div class="w-full max-w-sm auth-glass p-8 sm:p-10 slide-in-up relative overflow-hidden">
        
        <div class="absolute top-0 right-0 w-48 h-48 bg-gradient-to-bl from-red-500 to-rose-400 opacity-10 rounded-bl-full pointer-events-none"></div>

        <!-- 1. Header -->
        <div class="mb-8 relative z-10">
            <div class="h-12 w-12 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center text-xl mb-4 shadow-sm border border-red-100">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight leading-none mb-1.5">Sign Up</h2>
            <p class="text-xs font-medium text-slate-500">Create a new account</p>
        </div>

        <!-- 2. Security Warning (Minimal) -->
        <div class="bg-amber-50/80 border-l-4 border-amber-400 p-3 mb-6 rounded-r-xl relative z-10">
            <p class="text-[9px] text-amber-800 font-bold leading-relaxed">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> আসল @gmail.com এবং মোবাইল নাম্বার দিন। ১টি ডিভাইসে ১টির বেশি একাউন্ট নিষিদ্ধ।
            </p>
        </div>

        <!-- 3. Register Form -->
        <form id="registerForm" method="POST" action="/register" class="space-y-5 relative z-10">
            
            <input type="hidden" name="ref_code" value="{{ ref_code if ref_code else '' }}">
            <input type="hidden" name="device_id" id="deviceIdInput" value="">

            <!-- Name Input -->
            <div class="relative flex flex-col justify-end h-14">
                <input type="text" name="name" required minlength="3" class="uniq-input w-full text-sm font-bold text-slate-800 placeholder-slate-300" placeholder="Full Name">
                <i class="fa-regular fa-user input-icon"></i>
            </div>

            <!-- Phone Input -->
            <div class="relative flex flex-col justify-end h-14 group">
                <input type="tel" name="phone" id="phoneInput" required pattern="01[3-9][0-9]{8}" class="uniq-input w-full text-sm font-bold font-mono tracking-wider text-slate-800 placeholder-slate-300" placeholder="017XXXXXXXX">
                <i class="fa-solid fa-phone input-icon text-[13px]"></i>
                <p class="absolute -bottom-4 right-0 text-[8px] font-bold text-red-500 hidden" id="phoneError">সঠিক নাম্বার দিন</p>
            </div>

            <!-- Email Input -->
            <div class="relative flex flex-col justify-end h-14 group">
                <input type="email" name="email" id="emailInput" required pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" class="uniq-input w-full text-sm font-bold font-mono text-slate-800 placeholder-slate-300" placeholder="user@gmail.com">
                <i class="fa-brands fa-google input-icon"></i>
                <p class="absolute -bottom-4 right-0 text-[8px] font-bold text-red-500 hidden" id="emailError">শুধুমাত্র জিমেইল</p>
            </div>
            
            <!-- Password Input -->
            <div class="relative flex flex-col justify-end h-14">
                <input type="password" name="password" required minlength="6" class="uniq-input w-full text-sm font-bold tracking-wider text-slate-800 placeholder-slate-300" placeholder="Create Password">
                <i class="fa-solid fa-lock input-icon"></i>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-red-600 active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
                <span>Create Account</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <!-- 4. Login Link -->
        <div class="mt-8 pt-6 border-t border-slate-100 text-center relative z-10">
            <p class="text-[11px] font-semibold text-slate-500">
                Already registered? 
                <a href="/login" class="text-red-600 font-black hover:underline ml-1 uppercase tracking-wider">Sign In</a>
            </p>
        </div>
    </div>
</div>

<script>
    // Live Input Validation
    const emailInput = document.getElementById('emailInput');
    const emailError = document.getElementById('emailError');
    emailInput.addEventListener('input', function() {
        if(this.value.length > 0 && !this.value.endsWith('@gmail.com')) emailError.classList.remove('hidden');
        else emailError.classList.add('hidden');
    });

    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');
    phoneInput.addEventListener('input', function() {
        const regex = /^01[3-9][0-9]{8}$/;
        if(this.value.length > 0 && !regex.test(this.value)) phoneError.classList.remove('hidden');
        else phoneError.classList.add('hidden');
    });

    // ThumbmarkJS Submit
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-lg"></i>';
        btn.classList.add('opacity-80', 'cursor-not-allowed', 'bg-red-600');

        ThumbmarkJS.getFingerprint().then(function(fp) {
            document.getElementById('deviceIdInput').value = fp;
            document.getElementById('registerForm').submit();
        }).catch(function(err) {
            document.getElementById('registerForm').submit();
        });
    });
</script>
{% endblock %}
