<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Server Error | GrowEarn</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Hind Siliguri', 'Inter', sans-serif; 
            background-color: #F8FAFC; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .bg-pattern { 
            position: absolute; inset: 0; 
            background-image: radial-gradient(#E2E8F0 2px, transparent 2px); 
            background-size: 30px 30px; opacity: 0.5; z-index: 0; 
        }
        .error-card { 
            background: #ffffff; border-radius: 32px; border: 1px solid #E2E8F0; 
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.05); position: relative; 
            z-index: 10; padding: 40px; text-align: center; max-width: 400px; width: 90%; 
        }
        .fade-in { 
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0; transform: translateY(20px); 
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        
        /* Warning Animation */
        .pulse-warn { animation: pulseWarning 2s infinite; }
        @keyframes pulseWarning { 
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.2); } 
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); } 
        }
    </style>
</head>
<body>

    <!-- Background Pattern -->
    <div class="bg-pattern"></div>

    <!-- Main Card -->
    <div class="error-card fade-in">
        
        <!-- Animated Icon -->
        <div class="h-20 w-20 bg-amber-50 text-amber-500 rounded-[20px] flex items-center justify-center text-4xl mx-auto mb-6 shadow-sm border border-amber-100 pulse-warn">
            <i class="fa-solid fa-server"></i>
        </div>
        
        <!-- Error Badge -->
        <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest mb-3 inline-block shadow-sm">
            Error 500
        </span>
        
        <!-- Title & Description -->
        <h1 class="text-2xl font-black text-slate-800 tracking-tight mb-2">সার্ভার এরর!</h1>
        <p class="text-sm text-slate-500 font-medium leading-relaxed mb-8">
            অতিরিক্ত ট্রাফিকের কারণে আমাদের সার্ভারে সাময়িক সমস্যা হচ্ছে। দয়া করে পেজটি রিফ্রেশ করুন অথবা হোমপেজে ফিরে যান।
        </p>
        
        <!-- Action Buttons -->
        <div class="flex flex-col gap-3">
            
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-xl text-sm font-black uppercase tracking-widest shadow-lg hover:bg-slate-800 active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> <span>Refresh Page</span>
            </button>
            
            <a href="/" class="w-full bg-slate-50 text-slate-600 border border-slate-200 py-4 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-slate-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-house"></i> <span>Back to Home</span>
            </a>
            
        </div>
    </div>

</body>
</html>
